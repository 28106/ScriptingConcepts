<html>
<head>
<title>Form Events Example</title>
<script>
function submitForm() {
alert("Form Submitted Successfully");
return false; // stops actual submission
}
function focusEvent() {
console.log("Input box focused");
}
function blurEvent() {
console.log("Input box lost focus");
}
function changeEvent() {
alert("You changed the selection");
}
function resetForm() {
alert("Form Reset");
}
</script>
</head>
<body>
<h2>Form Events in HTML & JavaScript</h2>
<form onsubmit="return submitForm()" onreset="resetForm()">
Name:
<input type="text"
onfocus="focusEvent()"
onblur="blurEvent()">
<br><br>
Course:
<select onchange="changeEvent()">
<option>Select</option>
<option>BCA</option>
<option>BSc</option>
<option>BCom</option>
</select>
<br><br>
<input type="submit" value="Submit">
<input type="reset" value="Reset">
</form>
</body>
</html
